version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aiwhale-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: aiwhale
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aiwhale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: aiwhale-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: .
    container_name: aiwhale-celery-worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
      - ./models:/app/models
    depends_on:
      - redis
      - postgres

  celery-beat:
    build: .
    container_name: aiwhale-celery-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data:
  redis_data:
